mqtt:
  enabled: true
  host: localhost # network_mode: host → mqtt 컨테이너는 호스트 포트 1883으로 접근

# === 글로벌 알림 설정 ===
notifications:
  enabled: true
  email: brianroh2@nate.com

# === go2rtc 서브스트림 설정 (라이브뷰용 저화질 스트림) ===
# Frigate 감지·녹화: 메인 스트림 직접 연결 (위 cameras 설정)
# 라이브뷰(클라우드 go2rtc): 서브스트림 경유 — 대역폭 20~30배 절감
go2rtc:
  streams:
    cctv-1-sub:
      - "exec:/usr/lib/ffmpeg/7.0/bin/ffmpeg -hide_banner -rtsp_transport tcp -i rtsp://admin:11qqaa..A@192.168.1.51:554/profile2 -c:v copy -f mpegts -"
    cctv-3-sub:
      - "exec:/usr/lib/ffmpeg/7.0/bin/ffmpeg -hide_banner -rtsp_transport tcp -i rtsp://admin1:11qqaa..@192.168.1.53:554/Ch2 -c:v copy -f mpegts -"

# === 글로벌 감지 객체 ===
objects:
  track:
    - person

snapshots:
  enabled: true
  bounding_box: true
  retain:
    default: 7

record:
  enabled: true
  detections:
    pre_capture: 3
    post_capture: 5
    retain:
      days: 7
      mode: active_objects

cameras:
  cctv-1: # TVT TD-9421S4C (Dome) — 192.168.1.51
    ffmpeg:
      inputs:
        - path: rtsp://admin:11qqaa..A@192.168.1.51:554/profile1  # 메인 (감지·녹화)
          roles:
            - detect
            - record
    detect:
      enabled: true
      width: 1920
      height: 1080
      fps: 5
    zones:
      zone_for_1:
        coordinates: 0.038,0.055,0.041,0.928,0.948,0.934,0.967,0.052
        inertia: 3
        loitering_time: 0
        friendly_name: Zone_for_1
    notifications:
      enabled: true

  cctv-3: # Vision Hitech TBT-Dome F977 — 192.168.1.53
    ffmpeg:
      inputs:
        - path: rtsp://admin1:11qqaa..@192.168.1.53:554/Ch1  # 메인 (감지·녹화)
          roles:
            - detect
            - record
    detect:
      enabled: true
      width: 1920
      height: 1080
      fps: 5
    zones:
      zone_for_3:
        coordinates: 0.025,0.052,0.022,0.967,0.976,0.958,0.983,0.044
        loitering_time: 0
        friendly_name: Zone_for_3
    notifications:
      enabled: true

# Intel HD 630 iGPU를 사용하여 객체 감지 (OpenVINO GPU 가속)
# renderD129 = Intel HD 630 / renderD128 = NVIDIA GTX 1070 (제외)
detectors:
  ov:
    type: openvino
    device: GPU

model:
  path: /openvino-model/ssdlite_mobilenet_v2.xml
  width: 300
  height: 300
  input_tensor: nhwc
  input_pixel_format: bgr
  labelmap_path: /openvino-model/coco_91cl_bkgr.txt

version: 0.17-0
